name: Release

on:
  pull_request:
    branches: ['master']
    types: ['closed']
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Wireit cache
        uses: google/wireit@setup-github-actions-caching/v2

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and create tag
        id: version
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version --ignore-scripts)
          git add package.json package-lock.json
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          echo "new_version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push origin HEAD:master --follow-tags

      - name: Publish to npm
        run: npm publish --access public
